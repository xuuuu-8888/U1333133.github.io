<!doctype html>
<html lang="zh-Hant">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>個人網站 - 首頁</title>
  <link rel="stylesheet" href="css/style.css">

  <style>
    /* 導覽列排版 */
    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav a {
      margin-left: 15px;
      text-decoration: none;
      color: #333;
    }

    nav a:hover {
      color: #007bff;
    }

    /* Hero */
    .hero {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-top: 20px;
    }

    .hero-photo {
      width: 200px;
      border-radius: 10px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
    }

    /* ===== 技能===== */
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-top: 20px;
    }

    .skill-item {
      background: #fff;
      padding: 15px;
      border-radius: 10px;
    }

    .skill-name {
      font-weight: bold;
      margin-bottom: 5px;
    }

    .bar {
      width: 100%;
      height: 12px;
      background: #e0e0e0;
      border-radius: 10px;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      background: linear-gradient(90deg, #4facfe, #00f2fe);
    }

    @media (max-width: 600px) {
      .skills-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>

</head>

<body>

  <!-- 導覽列 -->
  <header class="site-header">
    <div class="container header-inner">

      <h1 class="site-title">xinyu.dev</h1>

      <nav>
        <a href="index.html">首頁</a>
        <a href="about.html">關於我</a>
        <a href="projects.html">專案作品</a>
        <a href="articles.html">文章</a>
      </nav>

    </div>
  </header>

  <!-- 主內容 -->
  <main class="container">

    <!-- Hero -->
    <section class="hero">

      <img class="hero-photo" src="./images/2.jpg" alt="個人照片範例">

      <div class="hero-text">
        <h2>許芯瑀</h2>

        <p>
          國立聯合大學 資訊管理系學生 / 喜歡用數學與程式邏輯解決問題並打造實用系統
        </p>

        <a class="btn" href="about.html">了解更多</a>
      </div>

    </section>

    <!-- 重點 -->
    <section class="highlights">
      <h3>重點</h3>

      <ul>
        <li>學校：國立聯合大學 資訊管理學系</li>
        <li>主修：資料結構、資料庫、網頁前端</li>
        <li>技能：JavaScript、Python、SQL、Node.js</li>
      </ul>

    </section>

    <!-- ✅ 技能區（兩個一排 + PHP） -->
    <section class="skills-grid">

      <div class="skill-item">
        <div class="skill-name">HTML</div>
        <div class="bar"><div class="fill" style="width:90%"></div></div>
      </div>

      <div class="skill-item">
        <div class="skill-name">CSS</div>
        <div class="bar"><div class="fill" style="width:80%"></div></div>
      </div>

      <div class="skill-item">
        <div class="skill-name">JavaScript</div>
        <div class="bar"><div class="fill" style="width:65%"></div></div>
      </div>

      <div class="skill-item">
        <div class="skill-name">PHP</div>
        <div class="bar"><div class="fill" style="width:70%"></div></div>
      </div>

    </section>

  </main>

  <!-- 頁尾 -->
  <footer class="site-footer">
    <div class="container">
      <p>© 2026 許芯瑀。</p>
    </div>
  </footer>

</body>

</html>
